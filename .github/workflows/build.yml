name: Build SRunPy-GUI (IMUST)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pycryptodome pystray pywebview pywin32 win10toast nuitka ordered-set zstandard

      - name: Generate encrypted entry file
        shell: python
        run:
          import random, string, os
          aes_key = ''.join(random.choices(string.ascii_letters + string.digits, k=16))
          os.makedirs('build_output', exist_ok=True)
          with open('build_output/SRunClient.py', 'w', encoding='utf-8') as f:
              f.write(f"from srunpy.entry import Gui\nGui('{aes_key}')\n")
          print(f"Generated entry file with key: {aes_key}")

      - name: Compile with Nuitka
        run: |
          python -m nuitka --lto=no --standalone build_output/SRunClient.py --include-data-dir=srunpy/html=srunpy/html --windows-console-mode=attach --windows-icon-from-ico=srunpy/html/icons/logo.ico --file-version="1.0.9.1" --product-version="1.0.9.1" --company-name="IMUST" --product-name="IMUST Campus Login" --file-description="IMUST Campus Network Login Client"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SRunPy-IMUST
          path: build_output/SRunClient.dist/
          if-no-files-found: error
