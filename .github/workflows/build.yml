name: Build SRunPy-GUI (PyInstaller)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pycryptodome pystray pywebview pywin32 win10toast Pillow pyinstaller

      - name: Generate encrypted entry file
        shell: python
        run: |
          import random, string, os
          aes_key = ''.join(random.choices(string.ascii_letters + string.digits, k=16))
          with open('SRunClient.py', 'w', encoding='utf-8') as f:
              f.write(f"from srunpy.entry import Gui\nGui('{aes_key}')\n")
          print(f"Generated entry file with key: {aes_key}")

      - name: Build with PyInstaller
        run: |
          pyinstaller --clean --noconfirm srun_client.spec

      - name: Verify build output
        run: |
          if (Test-Path "dist\SRunClient.exe") {
            echo "Build successful!"
            Get-Item "dist\SRunClient.exe" | Select-Object Name, Length
          } else {
            echo "Build failed - exe not found"
            exit 1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SRunPy-IMUST
          path: dist/SRunClient.exe
          if-no-files-found: error
